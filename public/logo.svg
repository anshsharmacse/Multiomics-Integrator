<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#0a0a0a" stroke="url(#grad1)" stroke-width="2"/>
  
  <!-- DNA Double Helix -->
  <g transform="translate(100, 100)" filter="url(#glow)">
    <!-- First strand -->
    <path d="M-30,-60 Q0,-40 30,-60 Q60,-40 30,-20 Q0,-40 -30,-20 Q-60,0 -30,20 Q0,0 30,20 Q60,40 30,60 Q0,40 -30,60" 
          fill="none" stroke="#10b981" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Second strand -->
    <path d="M30,-60 Q0,-40 -30,-60 Q-60,-40 -30,-20 Q0,-40 30,-20 Q60,0 30,20 Q0,0 -30,20 Q-60,40 -30,60 Q0,40 30,60" 
          fill="none" stroke="#06b6d4" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Base pairs -->
    <line x1="-25" y1="-40" x2="25" y2="-40" stroke="#8b5cf6" stroke-width="3" opacity="0.8"/>
    <line x1="-20" y1="-10" x2="20" y2="-10" stroke="#f59e0b" stroke-width="3" opacity="0.8"/>
    <line x1="-20" y1="20" x2="20" y2="20" stroke="#8b5cf6" stroke-width="3" opacity="0.8"/>
    <line x1="-25" y1="50" x2="25" y2="50" stroke="#f59e0b" stroke-width="3" opacity="0.8"/>
    
    <!-- Nodes -->
    <circle cx="-25" cy="-40" r="5" fill="#10b981"/>
    <circle cx="25" cy="-40" r="5" fill="#06b6d4"/>
    <circle cx="-20" cy="-10" r="5" fill="#10b981"/>
    <circle cx="20" cy="-10" r="5" fill="#06b6d4"/>
    <circle cx="-20" cy="20" r="5" fill="#10b981"/>
    <circle cx="20" cy="20" r="5" fill="#06b6d4"/>
    <circle cx="-25" cy="50" r="5" fill="#10b981"/>
    <circle cx="25" cy="50" r="5" fill="#06b6d4"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="url(#grad1)">MultiOmics</text>
</svg>
